<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f7fb" />
    <title>IoT-Berg</title>
    <meta
      name="description"
      content="IoT-Berg builds practical software solutions with production-ready document conversion services: HTML-to-PDF, Markdown-to-PDF, and DOCX-to-PDF."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      var __errStyle = 'white-space:pre-wrap;word-break:break-word;font-size:0.85rem;background:#ffffff;color:#7f1d1d;padding:1rem;border-radius:8px;border:1px solid #fecaca';
      function __paintError() {
        document.body.style.background = '#f5f7fb';
        document.body.style.color = '#b91c1c';
        document.body.style.fontFamily = 'monospace';
        document.body.style.padding = '2rem';
      }
      window.onerror = function(msg, src, line, col, err) {
        __paintError();
        document.body.innerHTML = '<h2 style="color:#b91c1c">Uncaught Error</h2><pre style="' + __errStyle + '">' + msg + '\n\nFile: ' + src + ':' + line + ':' + col + '\n\n' + (err && err.stack ? err.stack : '') + '</pre>';
        return true;
      };
      window.addEventListener('unhandledrejection', function(e) {
        __paintError();
        document.body.innerHTML = '<h2 style="color:#b91c1c">Unhandled Promise Rejection</h2><pre style="' + __errStyle + '">' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
